services:
  mysql:
    env_file:
      - .env.staging
    ports:
      - "3306:3306"
    deploy:
      resources:
        limits:
          cpus: "0.4"
          memory: 300M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    env_file:
      - .env.staging
    ports:
      - "6379:6379"
    deploy:
      resources:
        limits:
          cpus: "0.2"
          memory: 50M
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  backend:
    container_name: tradeplay-backend
    image: tadel/tradeplay-backend:stg
    ports:
      - "8080:8080"
    env_file:
      - .env.staging
    deploy:
      resources:
        limits:
          cpus: "0.4"
          memory: 100M
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  frontend:
    container_name: tradeplay-frontend
    image: tadel/tradeplay-frontend:stg
    ports:
      - "5174:5173"

  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: tradeplay-tunnel
    restart: unless-stopped
    command: >
      tunnel run
    env_file:
      - .env.staging
    networks:
      - tradeplay-network
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"