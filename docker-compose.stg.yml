services:
  mysql:
    env_file:
      - .env.staging
    deploy:
      resources:
        limits:
          cpus: "0.4"
          memory: 300M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    env_file:
      - .env.staging
    deploy:
      resources:
        limits:
          cpus: "0.2"
          memory: 50M
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  backend:
    image: tadel/tradeplay-backend:latest
    env_file:
      - .env.staging
    deploy:
      resources:
        limits:
          cpus: "0.4"
          memory: 100M
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  frontend:
    image: tadel/tradeplay-frontend:latest
    ports:
      - "80:8080"

  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: tradeplay-tunnel
    restart: unless-stopped
    command: >
      tunnel run
    env_file:
      - .env.staging
    networks:
      - tradeplay-network
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"