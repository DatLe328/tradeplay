services:
  mysql:
    ports:
      - "3306:3306"
    env_file:
      - .env.development
  
  redis:
    ports:
      - "6379:6379"
    env_file:
      - .env.development

  backend:
    build:
      context: ./src/backend
      dockerfile: ./Dockerfile
      target: base
    command: go run main.go
    environment:
    - ENV_FILE=.env.development
    volumes:
      - ./src/backend:/app
    working_dir: /app/

  frontend:
    image: node:24-alpine
    working_dir: /app
    volumes:
      - ./src/frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    env_file:
      - .env.development
    command: sh -c "npm install && npm audit fix && npm run dev -- --host"