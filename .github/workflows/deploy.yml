name: Deploy Tien Co Truong Shop to DigitalOcean

on:
  push:
    branches:
      - main
      - staging

env:
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
  BACKEND_IMAGE: ${{ secrets.DOCKER_USERNAME }}/tradeplay-backend
  FRONTEND_IMAGE: ${{ secrets.DOCKER_USERNAME }}/tradeplay-frontend

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Run Backend Tests
        working-directory: ./src/backend
        run: |
          go mod download
          go test -v ./...

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: './src/frontend/package-lock.json'

      - name: Install dependencies
        working-directory: ./src/frontend
        run: npm ci

      - name: Run Frontend Tests
        working-directory: ./src/frontend
        run: npm run test -- --run --reporter=verbose

  build-and-push-production:
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    if: github.ref_name == 'main'
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./src/backend
          file: ./src/backend/Dockerfile
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:prd
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.BACKEND_IMAGE }}:prd
          cache-to: type=inline

      - name: Build and Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/nginx/Dockerfile
          push: true
          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL }}
            VITE_APP_VERSION=${{ secrets.VITE_APP_VERSION }}
            VITE_TURNSTILE_SITE_KEY=${{ secrets.VITE_TURNSTILE_SITE_KEY }}
            VITE_UNDER_MAINTENANCE=${{ secrets.VITE_UNDER_MAINTENANCE }}
          tags: |
            ${{ env.FRONTEND_IMAGE }}:prd
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.FRONTEND_IMAGE }}:prd
          cache-to: type=inline

  build-and-push-staging:
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    if: github.ref_name == 'staging'
    environment: staging
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./src/backend
          file: ./src/backend/Dockerfile
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:stg
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.BACKEND_IMAGE }}:stg
          cache-to: type=inline

      - name: Build and Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/nginx/Dockerfile
          push: true
          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL }}
            VITE_APP_VERSION=${{ secrets.VITE_APP_VERSION }}
            VITE_TURNSTILE_SITE_KEY=${{ secrets.VITE_TURNSTILE_SITE_KEY }}
            VITE_UNDER_MAINTENANCE=${{ secrets.VITE_UNDER_MAINTENANCE }}
          tags: |
            ${{ env.FRONTEND_IMAGE }}:stg
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.FRONTEND_IMAGE }}:stg
          cache-to: type=inline

  deploy-production:
    runs-on: ubuntu-latest
    needs: build-and-push-production
    if: github.ref_name == 'main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy docker folder and compose files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USER }}
          key: ${{ secrets.DO_SSH_KEY }}
          source: "docker/**,docker-compose.yml,docker-compose.prd.yml"
          target: "~/tradeplay"

      - name: Deploy to DigitalOcean
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USER }}
          key: ${{ secrets.DO_SSH_KEY }}
          script: |
            cd ~/tradeplay

            echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

            docker compose -f docker-compose.yml -f docker-compose.prd.yml pull
            docker compose -f docker-compose.yml -f docker-compose.prd.yml up -d --remove-orphans

            docker image prune -af

  deploy-staging:
    runs-on: ubuntu-latest
    needs: build-and-push-staging
    if: github.ref_name == 'staging'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEV_SSH_KEY }}" > ~/.ssh/dev_key
          chmod 600 ~/.ssh/dev_key
          ssh-keyscan -H ${{ secrets.DEV_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Copy docker folder and compose files to dev machine
        run: |
          ssh -i ~/.ssh/dev_key -o StrictHostKeyChecking=no \
            ${{ secrets.DEV_USER }}@${{ secrets.DEV_HOST }} "mkdir -p ~/tradeplay-staging"
          rsync -avz \
            -e "ssh -i ~/.ssh/dev_key -o StrictHostKeyChecking=no" \
            docker docker-compose.yml docker-compose.stg.yml \
            ${{ secrets.DEV_USER }}@${{ secrets.DEV_HOST }}:~/tradeplay-staging/

      - name: Deploy to dev machine via Tailscale
        run: |
          ssh -i ~/.ssh/dev_key -o StrictHostKeyChecking=no \
            ${{ secrets.DEV_USER }}@${{ secrets.DEV_HOST }} << 'EOF'
            cd ~/tradeplay-staging

            echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

            docker compose -f docker-compose.yml -f docker-compose.stg.yml pull
            docker compose -f docker-compose.yml -f docker-compose.stg.yml up -d --remove-orphans

            docker image prune -af
          EOF