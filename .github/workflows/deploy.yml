name: Deploy Tien Co Truong Shop to DigitalOcean

on:
  push:
    branches:
      - main
      - staging

env:
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
  BACKEND_IMAGE: ${{ secrets.DOCKER_USERNAME }}/tradeplay-backend
  FRONTEND_IMAGE: ${{ secrets.DOCKER_USERNAME }}/tradeplay-frontend

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Run Backend Tests
        working-directory: ./src/backend
        run: |
          go mod download
          go test -v ./...

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: './src/frontend/package-lock.json'

      - name: Install dependencies
        working-directory: ./src/frontend
        run: npm ci

      - name: Run Frontend Tests
        working-directory: ./src/frontend
        run: npm run test -- --run --reporter=verbose

  build-and-push:
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set frontend build args
        id: frontend-args
        run: |
          if [ "${{ github.ref_name }}" == "main" ]; then
            echo "VITE_API_URL=${{ secrets.VITE_API_URL_PRD }}" >> $GITHUB_OUTPUT
            echo "VITE_APP_VERSION=${{ secrets.VITE_APP_VERSION_PRD }}" >> $GITHUB_OUTPUT
            echo "VITE_TURNSTILE_SITE_KEY=${{ secrets.VITE_TURNSTILE_SITE_KEY_PRD }}" >> $GITHUB_OUTPUT
            echo "VITE_UNDER_MAINTENANCE=${{ secrets.VITE_UNDER_MAINTENANCE_PRD }}" >> $GITHUB_OUTPUT
          else
            echo "VITE_API_URL=${{ secrets.VITE_API_URL_STG }}" >> $GITHUB_OUTPUT
            echo "VITE_APP_VERSION=${{ secrets.VITE_APP_VERSION_STG }}" >> $GITHUB_OUTPUT
            echo "VITE_TURNSTILE_SITE_KEY=${{ secrets.VITE_TURNSTILE_SITE_KEY_STG }}" >> $GITHUB_OUTPUT
            echo "VITE_UNDER_MAINTENANCE=${{ secrets.VITE_UNDER_MAINTENANCE_STG }}" >> $GITHUB_OUTPUT
          fi

      - name: Build and Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./src/backend
          file: ./src/backend/Dockerfile
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.BACKEND_IMAGE }}:buildcache
          cache-to: type=inline

      - name: Build and Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/nginx/Dockerfile
          push: true
          build-args: |
            VITE_API_URL=${{ steps.frontend-args.outputs.VITE_API_URL }}
            VITE_APP_VERSION=${{ steps.frontend-args.outputs.VITE_APP_VERSION }}
            VITE_TURNSTILE_SITE_KEY=${{ steps.frontend-args.outputs.VITE_TURNSTILE_SITE_KEY }}
            VITE_UNDER_MAINTENANCE=${{ steps.frontend-args.outputs.VITE_UNDER_MAINTENANCE }}
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.FRONTEND_IMAGE }}:buildcache
          cache-to: type=inline

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set compose file name
        id: set-env
        run: |
          if [ "${{ github.ref_name }}" == "main" ]; then
            echo "COMPOSE_FILE=docker-compose.prd.yml" >> $GITHUB_OUTPUT
            echo "TARGET_DIR=~/tradeplay" >> $GITHUB_OUTPUT
          else
            echo "COMPOSE_FILE=docker-compose.stg.yml" >> $GITHUB_OUTPUT
            echo "TARGET_DIR=~/tradeplay-staging" >> $GITHUB_OUTPUT
          fi

      - name: Copy docker folder and compose files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USER }}
          key: ${{ secrets.DO_SSH_KEY }}
          source: "docker/**,docker-compose.yml,${{ steps.set-env.outputs.COMPOSE_FILE }}"
          target: "${{ steps.set-env.outputs.TARGET_DIR }}"

      - name: Deploy to DigitalOcean
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USER }}
          key: ${{ secrets.DO_SSH_KEY }}
          script: |
            cd ${{ steps.set-env.outputs.TARGET_DIR }}
            
            echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
            
            COMPOSE_FILES="-f docker-compose.yml -f ${{ steps.set-env.outputs.COMPOSE_FILE }}"
            
            docker compose $COMPOSE_FILES pull
            docker compose $COMPOSE_FILES up -d --remove-orphans
            
            docker image prune -af