name: Deploy Tien Co Truong Shop to DigitalOcean

on:
  push:
    branches:
      - main
      - staging

env:
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
  BACKEND_IMAGE: ${{ secrets.DOCKER_USERNAME }}/tradeplay-backend
  FRONTEND_IMAGE: ${{ secrets.DOCKER_USERNAME }}/tradeplay-frontend

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Run Backend Tests
        working-directory: ./src/backend
        run: |
          go mod download
          go test -v ./...

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: './src/frontend/package-lock.json'

      - name: Install dependencies
        working-directory: ./src/frontend
        run: npm ci

      - name: Run Frontend Tests
        working-directory: ./src/frontend
        run: npm run test -- --run --reporter=verbose

  build-and-push:
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set frontend build args
        id: frontend-args
        run: |
          if [ "${{ github.ref_name }}" == "main" ]; then
            echo "VITE_API_URL=${{ secrets.VITE_API_URL_PRD }}" >> $GITHUB_OUTPUT
            echo "VITE_APP_VERSION=${{ secrets.VITE_APP_VERSION_PRD }}" >> $GITHUB_OUTPUT
            echo "VITE_TURNSTILE_SITE_KEY=${{ secrets.VITE_TURNSTILE_SITE_KEY_PRD }}" >> $GITHUB_OUTPUT
            echo "VITE_UNDER_MAINTENANCE=${{ secrets.VITE_UNDER_MAINTENANCE_PRD }}" >> $GITHUB_OUTPUT
            echo "IMAGE_TAG=prd" >> $GITHUB_OUTPUT
          else
            echo "VITE_API_URL=${{ secrets.VITE_API_URL_STG }}" >> $GITHUB_OUTPUT
            echo "VITE_APP_VERSION=${{ secrets.VITE_APP_VERSION_STG }}" >> $GITHUB_OUTPUT
            echo "VITE_TURNSTILE_SITE_KEY=${{ secrets.VITE_TURNSTILE_SITE_KEY_STG }}" >> $GITHUB_OUTPUT
            echo "VITE_UNDER_MAINTENANCE=${{ secrets.VITE_UNDER_MAINTENANCE_STG }}" >> $GITHUB_OUTPUT
            echo "IMAGE_TAG=stg" >> $GITHUB_OUTPUT
          fi

      - name: Build and Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./src/backend
          file: ./src/backend/Dockerfile
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ steps.frontend-args.outputs.IMAGE_TAG }}
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.BACKEND_IMAGE }}:${{ steps.frontend-args.outputs.IMAGE_TAG }}
          cache-to: type=inline

      - name: Build and Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/nginx/Dockerfile
          push: true
          build-args: |
            VITE_API_URL=${{ steps.frontend-args.outputs.VITE_API_URL }}
            VITE_APP_VERSION=${{ steps.frontend-args.outputs.VITE_APP_VERSION }}
            VITE_TURNSTILE_SITE_KEY=${{ steps.frontend-args.outputs.VITE_TURNSTILE_SITE_KEY }}
            VITE_UNDER_MAINTENANCE=${{ steps.frontend-args.outputs.VITE_UNDER_MAINTENANCE }}
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ steps.frontend-args.outputs.IMAGE_TAG }}
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.FRONTEND_IMAGE }}:${{ steps.frontend-args.outputs.IMAGE_TAG }}
          cache-to: type=inline

  deploy-production:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref_name == 'main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy docker folder and compose files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USER }}
          key: ${{ secrets.DO_SSH_KEY }}
          source: "docker/**,docker-compose.yml,docker-compose.prd.yml"
          target: "~/tradeplay"

      - name: Deploy to DigitalOcean
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USER }}
          key: ${{ secrets.DO_SSH_KEY }}
          script: |
            cd ~/tradeplay

            echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

            docker compose -f docker-compose.yml -f docker-compose.prd.yml pull
            docker compose -f docker-compose.yml -f docker-compose.prd.yml up -d --remove-orphans

            docker image prune -af

  deploy-staging:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref_name == 'staging'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TS_AUTHKEY }}

      - name: Copy docker folder and compose files to dev machine
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEV_HOST }}
          username: ${{ secrets.DEV_USER }}
          key: ${{ secrets.DEV_SSH_KEY }}
          source: "docker/**,docker-compose.yml,docker-compose.stg.yml"
          target: "~/tradeplay-staging"

      - name: Deploy to dev machine via Tailscale
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEV_HOST }}
          username: ${{ secrets.DEV_USER }}
          key: ${{ secrets.DEV_SSH_KEY }}
          script: |
            cd ~/tradeplay-staging

            echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

            docker compose -f docker-compose.yml -f docker-compose.stg.yml pull
            docker compose -f docker-compose.yml -f docker-compose.stg.yml up -d --remove-orphans

            docker image prune -af