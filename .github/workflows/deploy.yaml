name: Deploy Tien Co Truong Shop to DigitalOcean

on:
  push:
    branches:
      - main

env:
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
  BACKEND_IMAGE: ${{ secrets.DOCKER_USERNAME }}/tradeplay-backend
  FRONTEND_IMAGE: ${{ secrets.DOCKER_USERNAME }}/tradeplay-frontend

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Run Backend Tests
        working-directory: ./src/backend
        run: |
          go mod download
          go test -v ./...

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './src/frontend/package-lock.json'

      - name: Install dependencies
        working-directory: ./src/frontend
        run: npm ci

      - name: Run Frontend Tests
        working-directory: ./src/frontend
        run: npm run test -- --run --reporter=verbose

  build-and-push:
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./src/backend
          file: ./src/backend/Dockerfile
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.BACKEND_IMAGE }}:buildcache
          cache-to: type=inline

      - name: Build and Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./src/frontend
          file: ./src/frontend/Dockerfile
          push: true
          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL || '/backend-service/v1' }}
            VITE_APP_VERSION=${{ secrets.VITE_APP_VERSION || 'v1.2.0' }}
            VITE_TURNSTILE_SITE_KEY=${{ secrets.VITE_TURNSTILE_SITE_KEY || '0x4AAAAAACLNeMR7-qackiWQ' }}
            VITE_UNDER_MAINTENANCE=${{ secrets.VITE_UNDER_MAINTENANCE || 'false' }}
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.FRONTEND_IMAGE }}:buildcache
          cache-to: type=inline

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Read docker-compose file
        id: read-compose
        run: |
          COMPOSE_CONTENT=$(base64 -w 0 deployments/docker/docker-compose.production.yaml)
          echo "content=$COMPOSE_CONTENT" >> $GITHUB_OUTPUT

      - name: Read init.sql file
        id: read-init-sql
        run: |
          INIT_SQL_CONTENT=$(base64 -w 0 deployments/docker/init.sql)
          echo "content=$INIT_SQL_CONTENT" >> $GITHUB_OUTPUT

      - name: Deploy to DigitalOcean
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USER }}
          key: ${{ secrets.DO_SSH_KEY }}
          script: |
            mkdir -p ~/app
            cd ~/app
            
            # Copy docker-compose file (decode from base64)
            echo "${{ steps.read-compose.outputs.content }}" | base64 -d > docker-compose.production.yaml
            
            # Copy init.sql file (decode from base64)
            echo "${{ steps.read-init-sql.outputs.content }}" | base64 -d > init.sql
            
            # Create .env.production if not exists
            if [ ! -f .env.production ]; then
              echo "Creating .env.production file..."
              touch .env.production
              echo "⚠️  Please configure .env.production manually on the server"
            fi
            
            # Login to Docker
            echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
            
            # Pull and restart
            docker compose -f docker-compose.production.yaml pull
            docker compose -f docker-compose.production.yaml up -d --remove-orphans
            
            # Cleanup
            docker image prune -af